# Kubernetes Deployment Configuration for PDF-Flow
# Production-ready deployment with HPA, health checks, and monitoring

apiVersion: v1
kind: Namespace
metadata:
  name: pdf-flow
  labels:
    app: pdf-flow
    environment: production

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: pdf-flow-config
  namespace: pdf-flow
data:
  ENVIRONMENT: "production"
  API_V1_PREFIX: "/api/v1"
  ALLOWED_ORIGINS: "https://pdf-flow.com,https://www.pdf-flow.com"
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/1"

---
# Secret for sensitive data (base64 encoded)
# Note: Replace with actual secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: pdf-flow-secrets
  namespace: pdf-flow
type: Opaque
data:
  SECRET_KEY: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24="  # change-me-in-production
  DATABASE_URL: "cG9zdGdyZXNxbDovL3VzZXI6cGFzc0Bwb3N0Z3Jlczo1NDMyL3BkZmZsb3c="
  GEMINI_API_KEY: ""
  SENTRY_DSN: ""
  POSTHOG_API_KEY: ""
  STRIPE_SECRET_KEY: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-flow-backend
  namespace: pdf-flow
  labels:
    app: pdf-flow
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pdf-flow
      component: backend
  template:
    metadata:
      labels:
        app: pdf-flow
        component: backend
    spec:
      containers:
      - name: backend
        image: pdf-flow/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: pdf-flow-config
              key: ENVIRONMENT
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: SECRET_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: pdf-flow-config
              key: REDIS_URL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: GEMINI_API_KEY
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: SENTRY_DSN
        - name: POSTHOG_API_KEY
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: POSTHOG_API_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: temp-storage
          mountPath: /tmp/pdf-flow
      volumes:
      - name: temp-storage
        emptyDir:
          sizeLimit: 10Gi

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: pdf-flow
  labels:
    app: pdf-flow
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: pdf-flow
    component: backend

---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-flow-celery-worker
  namespace: pdf-flow
  labels:
    app: pdf-flow
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pdf-flow
      component: celery-worker
  template:
    metadata:
      labels:
        app: pdf-flow
        component: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: pdf-flow/backend:latest
        command: ["celery", "-A", "app.celery_worker", "worker", "--loglevel=info", "--concurrency=4"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pdf-flow-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: pdf-flow-config
              key: REDIS_URL
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: pdf-flow-config
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: pdf-flow-config
              key: CELERY_RESULT_BACKEND
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: temp-storage
          mountPath: /tmp/pdf-flow
      volumes:
      - name: temp-storage
        emptyDir:
          sizeLimit: 20Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pdf-flow
  labels:
    app: pdf-flow
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-flow
      component: redis
  template:
    metadata:
      labels:
        app: pdf-flow
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: pdf-flow
  labels:
    app: pdf-flow
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: pdf-flow
    component: redis

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: pdf-flow
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# Horizontal Pod Autoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pdf-flow-backend-hpa
  namespace: pdf-flow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pdf-flow-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# Horizontal Pod Autoscaler for Celery Workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pdf-flow-celery-hpa
  namespace: pdf-flow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pdf-flow-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pdf-flow-ingress
  namespace: pdf-flow
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - api.pdf-flow.com
    secretName: pdf-flow-tls
  rules:
  - host: api.pdf-flow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pdf-flow-network-policy
  namespace: pdf-flow
spec:
  podSelector:
    matchLabels:
      app: pdf-flow
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          component: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS for external APIs
    - protocol: TCP
      port: 5432  # PostgreSQL
